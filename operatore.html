<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ispecto — Operatore</title>
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/piexifjs@1.0.6/piexif.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #080c14;
  --surface: #0d1525;
  --surface2: #111d33;
  --border: rgba(99,179,237,0.12);
  --accent: #3b82f6;
  --accent2: #60a5fa;
  --cyan: #22d3ee;
  --red: #ef4444;
  --green: #10b981;
  --orange: #f59e0b;
  --text: #e2e8f0;
  --muted: #94a3b8;
  --font-head: 'Syne', sans-serif;
  --font-body: 'DM Sans', sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* Noise overlay */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 0;
}

/* HEADER */
header {
  position: relative;
  z-index: 10;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
.logo {
  font-family: var(--font-head);
  font-weight: 800;
  font-size: 1rem;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  display: flex;
  align-items: center;
  gap: 10px;
}
.logo-icon {
  width: 28px; height: 28px;
  background: var(--accent);
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
}
.logo span { color: var(--muted); font-weight: 400; }

.badge {
  display: flex; align-items: center; gap: 6px;
  padding: 5px 12px;
  border-radius: 20px;
  font-size: 0.78rem;
  font-weight: 500;
  border: 1px solid var(--border);
  background: var(--surface2);
  transition: all 0.3s;
}
.badge::before {
  content: '';
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--muted);
  transition: all 0.3s;
}
.badge.connesso { border-color: rgba(16,185,129,0.3); color: var(--green); }
.badge.connesso::before { background: var(--green); box-shadow: 0 0 6px var(--green); }
.badge.attesa { border-color: rgba(245,158,11,0.3); color: var(--orange); }
.badge.attesa::before { background: var(--orange); animation: pulse 1.5s infinite; }
.badge.errore { border-color: rgba(239,68,68,0.3); color: var(--red); }
.badge.errore::before { background: var(--red); }
@keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.3; } }

/* MAIN LAYOUT */
main {
  display: flex;
  flex: 1;
  overflow: hidden;
  position: relative;
  z-index: 1;
}

/* VIDEO AREA */
#video-area {
  flex: 1;
  position: relative;
  background: #000;
  overflow: hidden;
}
#video-remoto {
  width: 100%;
  height: 100%;
  object-fit: contain;
  display: block;
}
#placeholder {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  background: var(--bg);
}
.placeholder-icon {
  width: 80px; height: 80px;
  border-radius: 50%;
  border: 2px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 32px;
  animation: breathe 3s ease-in-out infinite;
}
@keyframes breathe {
  0%,100% { transform: scale(1); opacity: 0.5; }
  50% { transform: scale(1.05); opacity: 1; }
}
.placeholder-text {
  font-family: var(--font-head);
  font-size: 0.85rem;
  color: var(--muted);
  letter-spacing: 0.1em;
  text-transform: uppercase;
}

/* SCAN LINE animazione su video attivo */
#video-area.active::after {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--cyan), transparent);
  animation: scan 4s linear infinite;
  opacity: 0.4;
}
@keyframes scan {
  0% { top: 0; } 100% { top: 100%; }
}

/* Corner decorators */
.corner {
  position: absolute;
  width: 20px; height: 20px;
  border-color: var(--accent2);
  border-style: solid;
  opacity: 0.6;
  z-index: 5;
}
.corner-tl { top: 12px; left: 12px; border-width: 2px 0 0 2px; }
.corner-tr { top: 12px; right: 12px; border-width: 2px 2px 0 0; }
.corner-bl { bottom: 12px; left: 12px; border-width: 0 0 2px 2px; }
.corner-br { bottom: 12px; right: 12px; border-width: 0 2px 2px 0; }

/* REC indicator */
#rec-indicator {
  display: none;
  position: absolute;
  top: 16px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(8px);
  border: 1px solid rgba(239,68,68,0.3);
  border-radius: 20px;
  padding: 5px 14px;
  font-size: 0.75rem;
  font-weight: 600;
  color: var(--red);
  letter-spacing: 0.1em;
  z-index: 10;
  gap: 6px;
  align-items: center;
}
#rec-indicator.visible { display: flex; }
#rec-indicator::before {
  content: '';
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--red);
  animation: pulse 1s infinite;
}

/* SIDEBAR */
#sidebar {
  width: 300px;
  background: var(--surface);
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow-y: auto;
  flex-shrink: 0;
}
#sidebar::-webkit-scrollbar { width: 4px; }
#sidebar::-webkit-scrollbar-track { background: transparent; }
#sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.section {
  padding: 16px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.section-label {
  font-family: var(--font-head);
  font-size: 0.65rem;
  font-weight: 700;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 12px;
}

/* Link box */
#link-box {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 12px;
  font-size: 0.72rem;
  word-break: break-all;
  color: var(--accent2);
  line-height: 1.5;
  min-height: 44px;
  font-family: monospace;
  margin-bottom: 10px;
}

/* Buttons */
.btn {
  width: 100%;
  padding: 10px 14px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-family: var(--font-body);
  font-size: 0.85rem;
  font-weight: 500;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  margin-bottom: 6px;
}
.btn:disabled { opacity: 0.3; cursor: not-allowed; }
.btn:last-child { margin-bottom: 0; }
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:not(:disabled):hover { background: var(--accent2); transform: translateY(-1px); }
.btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
.btn-secondary:not(:disabled):hover { border-color: var(--accent); color: var(--accent2); }
.btn-danger {
  background: var(--red);
  color: #fff;
  font-family: var(--font-head);
  font-size: 1rem;
  font-weight: 700;
  letter-spacing: 0.05em;
  padding: 16px;
}
.btn-danger:not(:disabled):hover { background: #dc2626; transform: translateY(-1px); box-shadow: 0 4px 24px rgba(239,68,68,0.45); }
.btn-green { background: rgba(16,185,129,0.1); color: var(--green); border: 1px solid rgba(16,185,129,0.2); }
.btn-green:not(:disabled):hover { background: rgba(16,185,129,0.2); }

/* Qualità video — preset */
.qualita-preset-group {
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.btn-preset {
  width: 100%;
  padding: 9px 12px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--muted);
  font-family: var(--font-body);
  font-size: 0.82rem;
  cursor: pointer;
  text-align: left;
  display: flex;
  align-items: center;
  gap: 10px;
  transition: all 0.18s;
}
.btn-preset:disabled { opacity: 0.3; cursor: not-allowed; }
.btn-preset:not(:disabled):hover { border-color: var(--accent); color: var(--text); }
.btn-preset.attivo {
  border-color: var(--accent);
  background: rgba(59,130,246,0.12);
  color: var(--text);
}
.btn-preset .preset-icon { font-size: 1rem; flex-shrink: 0; }
.btn-preset .preset-info { display: flex; flex-direction: column; gap: 1px; }
.btn-preset .preset-nome { font-weight: 500; font-size: 0.82rem; }
.btn-preset .preset-dettaglio { font-size: 0.7rem; color: var(--muted); }

/* FOTO SECTION */
#foto-section {
  display: flex;
  flex-direction: column;
  padding: 16px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.foto-header {
  font-family: var(--font-head);
  font-size: 0.65rem;
  font-weight: 700;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 12px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.foto-count-badge {
  background: var(--accent);
  color: #fff;
  font-size: 0.7rem;
  padding: 2px 8px;
  border-radius: 10px;
  font-family: var(--font-body);
  font-weight: 600;
}
#foto-list {
  overflow-y: auto;
  max-height: 320px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  align-content: start;
}
#foto-list::-webkit-scrollbar { width: 4px; }
#foto-list::-webkit-scrollbar-track { background: transparent; }
#foto-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.foto-item {
  position: relative;
  border-radius: 8px;
  overflow: hidden;
  aspect-ratio: 4/3;
  border: 1px solid var(--border);
  cursor: pointer;
  transition: transform 0.2s;
}
.foto-item:hover { transform: scale(1.02); }
.foto-item img { width: 100%; height: 100%; object-fit: cover; }
.foto-item-label {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  background: linear-gradient(transparent, rgba(0,0,0,0.8));
  padding: 8px 6px 4px;
  font-size: 0.6rem;
  color: rgba(255,255,255,0.7);
}

/* LOG */
#log-section {
  padding: 12px 16px;
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}
#log {
  background: var(--bg);
  border-radius: 6px;
  padding: 8px;
  font-size: 0.68rem;
  color: var(--cyan);
  height: 72px;
  overflow-y: auto;
  font-family: monospace;
  line-height: 1.6;
}
#log::-webkit-scrollbar { width: 3px; }
#log::-webkit-scrollbar-thumb { background: var(--border); }

.btn-wa { background: rgba(37,211,102,0.1); color: #25d366; border: 1px solid rgba(37,211,102,0.2); }
.btn-wa:not(:disabled):hover { background: rgba(37,211,102,0.2); }

/* FOTO FLASH */
#flash {
  position: fixed;
  inset: 0;
  background: white;
  opacity: 0;
  pointer-events: none;
  z-index: 100;
  transition: opacity 0.05s;
}
#flash.active { opacity: 0.6; }
</style>
</head>
<body>

<div id="flash"></div>

<header>
  <div class="logo">
    <img src="Logo.png" alt="Ispecto" style="height:28px;width:auto;">
    Ispecto <span>/ Operatore</span>
  </div>
  <span id="stato" class="badge">Disconnesso</span>
</header>

<main>
  <div id="video-area">
    <div class="corner corner-tl"></div>
    <div class="corner corner-tr"></div>
    <div class="corner corner-bl"></div>
    <div class="corner corner-br"></div>
    <div id="rec-indicator">LIVE</div>
    <div id="quality-badge" style="display:none;position:absolute;top:12px;right:12px;z-index:5;background:rgba(0,0,0,0.6);backdrop-filter:blur(6px);border-radius:8px;padding:4px 10px;font-size:0.72rem;font-family:var(--font-head);letter-spacing:0.08em;color:#fff;"></div>
    <video id="video-remoto" autoplay playsinline></video>
    <div id="placeholder">
      <div class="placeholder-icon">📡</div>
      <div class="placeholder-text">In attesa del cliente</div>
    </div>
  </div>

  <div id="sidebar">
    <div class="section">
      <div class="section-label">Sessione</div>
      <div id="link-box">Clicca "Nuova Sessione" per iniziare</div>
      <button class="btn btn-primary" id="btn-nuova">＋ Nuova Sessione</button>
      <button class="btn btn-secondary" id="btn-copia" disabled>📋 Copia Link Cliente</button>
      <button class="btn btn-wa" id="btn-wa">📲 Invia su WhatsApp</button>
      
    </div>

    <div class="section">
      <div class="section-label">Controlli</div>
      <button class="btn btn-danger" id="btn-foto" disabled>📸 SCATTA FOTO</button>
      <button class="btn btn-green" id="btn-cartella">📁 Seleziona Cartella</button>
    </div>

    <div class="section">
      <div class="section-label">Qualità Video</div>
      <div class="qualita-preset-group">
        <button class="btn-preset attivo" id="preset-auto" disabled>
          <span class="preset-icon">⚡</span>
          <span class="preset-info">
            <span class="preset-nome">Automatica</span>
            <span class="preset-dettaglio">700 kbps · 15 fps</span>
          </span>
        </button>
        <button class="btn-preset" id="preset-lenta" disabled>
          <span class="preset-icon">🐢</span>
          <span class="preset-info">
            <span class="preset-nome">Rete lenta</span>
            <span class="preset-dettaglio">350 kbps · 10 fps</span>
          </span>
        </button>
        <button class="btn-preset" id="preset-alta" disabled>
          <span class="preset-icon">🔬</span>
          <span class="preset-info">
            <span class="preset-nome">Alta qualità</span>
            <span class="preset-dettaglio">1400 kbps · 24 fps</span>
          </span>
        </button>
      </div>
    </div>

    <div id="foto-section">
      <div class="foto-header">
        Foto Scattate
        <span class="foto-count-badge" id="foto-count">0</span>
      </div>
      <div id="foto-list"></div>
    </div>

    <div id="log-section">
      <div class="section-label">Log</div>
      <div id="log"></div>
    </div>
  </div>
</main>

<script>
const SERVER = 'https://videoperizie-server-production.up.railway.app';
const params = new URLSearchParams(window.location.search);
const token = params.get('token');
const perizia_id = params.get('perizia_id');
const telefono_cliente = params.get('telefono');
const nome_cliente = params.get('nome');
const riferimento = params.get('riferimento') || localStorage.getItem('vp_riferimento') || '';
const vp_token = localStorage.getItem('vp_token');

if (!token || !vp_token) window.location.href = 'dashboard.html';

let socket, pc, cartella, fotoCount = 0;
let localStream;
let iceServers = [
  { urls: 'stun:stun.l.google.com:19302' },
  { urls: 'stun:stun1.l.google.com:19302' }
];

// Carica ICE servers Twilio
(async () => {
  try {
    const res = await fetch(`${SERVER}/ice-servers`, {
      headers: { 'Authorization': `Bearer ${vp_token}` }
    });
    const data = await res.json();
    if (data.iceServers) { iceServers = data.iceServers; log('🔒 TURN Twilio attivo'); }
  } catch(e) { log('STUN fallback attivo'); }
})();

const statoEl = document.getElementById('stato');
const linkBox = document.getElementById('link-box');
const videoRemoto = document.getElementById('video-remoto');
const placeholder = document.getElementById('placeholder');
const videoArea = document.getElementById('video-area');
const btnNuova = document.getElementById('btn-nuova');
const btnCopia = document.getElementById('btn-copia');
const btnFoto = document.getElementById('btn-foto');
const btnCartella = document.getElementById('btn-cartella');
const presetBtns = {
  auto:  document.getElementById('preset-auto'),
  lenta: document.getElementById('preset-lenta'),
  alta:  document.getElementById('preset-alta')
};
const PRESETS = {
  auto:  { maxBitrate: 700,  maxFps: 15 },
  lenta: { maxBitrate: 350,  maxFps: 10 },
  alta:  { maxBitrate: 1400, maxFps: 24 }
};
const fotoList = document.getElementById('foto-list');
const fotoCountEl = document.getElementById('foto-count');
const logEl = document.getElementById('log');
const recIndicator = document.getElementById('rec-indicator');
const flash = document.getElementById('flash');

// Nascondi bottone nuova sessione — viene dalla dashboard
btnNuova.style.display = 'none';

// Mostra link cliente
const link = `${window.location.origin}/videoperizie/cliente.html?token=${token}`;
linkBox.textContent = link;
btnCopia.disabled = false;

function log(msg) {
  const t = new Date().toLocaleTimeString();
  logEl.innerHTML += `[${t}] ${msg}\n`;
  logEl.scrollTop = logEl.scrollHeight;
}

function setStato(s, classe) {
  statoEl.textContent = s;
  statoEl.className = 'badge ' + classe;
}

async function aggiornaStato(stato) {
  try {
    await fetch(`${SERVER}/perizie/${perizia_id}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${vp_token}` },
      body: JSON.stringify({ stato })
    });
  } catch(e) { log('Errore aggiornamento stato'); }
}

// IndexedDB per cartella predefinita
async function apriDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open('ispecto', 1);
    req.onupgradeneeded = e => e.target.result.createObjectStore('cartella');
    req.onsuccess = e => resolve(e.target.result);
    req.onerror = reject;
  });
}
async function salvaCartellaDB(handle) {
  const db = await apriDB();
  const tx = db.transaction('cartella', 'readwrite');
  tx.objectStore('cartella').put(handle, 'default');
}
async function caricaCartellaDB() {
  try {
    const db = await apriDB();
    return new Promise((resolve) => {
      const tx = db.transaction('cartella', 'readonly');
      const req = tx.objectStore('cartella').get('default');
      req.onsuccess = e => resolve(e.target.result || null);
      req.onerror = () => resolve(null);
    });
  } catch(e) { return null; }
}

// Carica cartella predefinita dalla dashboard
(async () => {
  const handle = await caricaCartellaDB();
  if (handle) {
    try {
      const perm = await handle.requestPermission({ mode: 'readwrite' });
      if (perm === 'granted') {
        cartella = handle;
        btnCartella.textContent = `✅ ${cartella.name}`;
        log(`Cartella predefinita: ${cartella.name}`);
      }
    } catch(e) {
      log('Riseleziona la cartella');
    }
  }
})();

btnCartella.addEventListener('click', async () => {
  try {
    cartella = await window.showDirectoryPicker();
    log(`Cartella: ${cartella.name}`);
    btnCartella.textContent = `✅ ${cartella.name}`;
    await salvaCartellaDB(cartella);
  } catch(e) { log('Selezione cartella annullata'); }
});

btnCopia.addEventListener('click', () => {
  navigator.clipboard.writeText(link);
  btnCopia.textContent = '✅ Link Copiato!';
  setTimeout(() => { btnCopia.textContent = '📋 Copia Link Cliente'; }, 2000);
  log('Link copiato!');
});

document.getElementById('btn-wa').addEventListener('click', () => {
  let tel = (telefono_cliente || '').replace(/\s/g, '').replace(/[^\d]/g, '');
  if (tel.startsWith('0')) tel = '39' + tel.slice(1);
  if (!tel.startsWith('39')) tel = '39' + tel;
  const msg = encodeURIComponent(`Gentile ${nome_cliente || 'Cliente'}, la contatto per avviare la videoperizia. Clicchi sul link per iniziare: ${link}`);
  window.open(`https://wa.me/${tel || ''}?text=${msg}`, '_blank');
});

let fotoInCorso = false;
let disconnectTimer = null;

btnFoto.addEventListener('click', () => {
  if (socket && token && !fotoInCorso) {
    fotoInCorso = true;
    btnFoto.disabled = true;
    socket.emit('scatta-foto', { token });
    flashEffect();
    log('Comando foto inviato');
    setTimeout(() => {
      if (fotoInCorso) {
        fotoInCorso = false;
        btnFoto.disabled = false;
        log('⚠️ Timeout foto — riprova');
      }
    }, 6000);
  }
});

function inviaLimiti(key) {
  if (!socket || !token) return;
  const { maxBitrate, maxFps } = PRESETS[key];
  socket.emit('imposta-limiti', { token, maxBitrate, maxFps });
  Object.entries(presetBtns).forEach(([k, btn]) => btn.classList.toggle('attivo', k === key));
  const nomi = { auto: 'Automatica', lenta: 'Rete lenta', alta: 'Alta qualità' };
  log(`Qualità → ${nomi[key]} (${maxBitrate} kbps · ${maxFps} fps)`);
}
Object.keys(presetBtns).forEach(key => {
  presetBtns[key].addEventListener('click', () => inviaLimiti(key));
});

// Bottone termina sessione
document.getElementById('btn-nuova').insertAdjacentHTML('afterend', `

// Monitor qualità connessione
let qualityTimer = null;
let prevPacketsLost = 0;
let prevPacketsReceived = 0;
let prevFramesDecoded = 0;
let frozenFrameCount = 0;

function avviaMonitorQualita() {
  if (qualityTimer) clearInterval(qualityTimer);
  const badge = document.getElementById('quality-badge');
  if (!badge) return;
  badge.style.display = 'block';
  prevPacketsLost = 0; prevPacketsReceived = 0;
  prevFramesDecoded = 0; frozenFrameCount = 0;

  qualityTimer = setInterval(async () => {
    if (!pc) return;

    // Controlla stato connessione direttamente
    const cs = pc.connectionState;
    if (cs === 'disconnected' || cs === 'failed' || cs === 'closed') {
      badge.textContent = '🔴 Senza video';
      badge.style.color = '#ef4444';
      return;
    }

    try {
      const stats = await pc.getStats();
      let lost = 0, received = 0, framesDecoded = 0;
      stats.forEach(s => {
        if (s.type === 'inbound-rtp' && s.kind === 'video') {
          lost = s.packetsLost || 0;
          received = s.packetsReceived || 0;
          framesDecoded = s.framesDecoded || 0;
        }
      });

      const deltaLost = lost - prevPacketsLost;
      const deltaReceived = received - prevPacketsReceived;
      const deltaFrames = framesDecoded - prevFramesDecoded;
      prevPacketsLost = lost;
      prevPacketsReceived = received;
      prevFramesDecoded = framesDecoded;

      // Rileva freeze video (0 frame nuovi per 2+ cicli = ~10s)
      if (deltaFrames === 0 && received > 0) {
        frozenFrameCount++;
      } else {
        frozenFrameCount = 0;
      }

      if (frozenFrameCount >= 2) {
        badge.textContent = '🔴 Video bloccato';
        badge.style.color = '#ef4444';
        return;
      }

      const total = deltaLost + deltaReceived;
      const lossRate = total > 0 ? deltaLost / total : 0;

      if (lossRate < 0.02) {
        badge.textContent = '🟢 Rete ottima';
        badge.style.color = '#10b981';
      } else if (lossRate < 0.08) {
        badge.textContent = '🟡 Rete media';
        badge.style.color = '#f59e0b';
      } else {
        badge.textContent = '🔴 Rete scarsa';
        badge.style.color = '#ef4444';
      }
    } catch(e) {}
  }, 5000);
}

function fermaMonitorQualita() {
  if (qualityTimer) { clearInterval(qualityTimer); qualityTimer = null; }
  const badge = document.getElementById('quality-badge');
  if (badge) badge.style.display = 'none';
}

collegaSocket();

function collegaSocket() {
  socket = io(SERVER);
  setStato('Connessione...', 'attesa');

  socket.on('connect', () => {
    socket.emit('join-operatore', { token });
    setStato('In attesa cliente', 'attesa');
    log('In attesa che il cliente apra il link...');
  });

  socket.on('cliente-connesso', async () => {
    if (disconnectTimer) {
      clearTimeout(disconnectTimer);
      disconnectTimer = null;
    }

    setStato('Cliente connesso', 'connesso');
    log('Cliente connesso! Avvio WebRTC...');
    btnFoto.disabled = false;
    Object.values(presetBtns).forEach(btn => btn.disabled = false);
    inviaLimiti('auto');
    recIndicator.classList.add('visible');

    // Ripristina video (potrebbe essere dimmato da peer-disconnesso)
    videoRemoto.style.opacity = '1';
    videoRemoto.style.filter = '';

    // Chiudi eventuale pc rimasto aperto prima di riaprire
    if (pc) {
      try { pc.ontrack = null; pc.onicecandidate = null; pc.onconnectionstatechange = null; pc.close(); } catch(_) {}
      pc = null;
    }

    await aggiornaStato('in_corso');
    await avviaWebRTC();
  });

  socket.on('segnale', async ({ data }) => {
    if (!pc) return;
    if (data.type === 'answer') {
      await pc.setRemoteDescription(data);
    } else if (data.candidate) {
      await pc.addIceCandidate(data);
    }
  });

  socket.on('foto', async ({ blob, gps }) => {
    fotoCount++;
    log(`Foto ricevuta! (${fotoCount})`);
    await salvaFoto(blob, gps);
    fotoInCorso = false;
    btnFoto.disabled = false;
  });

  socket.on('peer-disconnesso', async () => {
    setStato('Connessione instabile — attendere...', 'attesa');
    btnFoto.disabled = true;
    recIndicator.classList.remove('visible');

    videoRemoto.style.opacity = '0.35';
    videoRemoto.style.filter = 'grayscale(60%)';

    const badge = document.getElementById('quality-badge');
    if (badge) { badge.textContent = '🔴 Senza video'; badge.style.color = '#ef4444'; badge.style.display = 'block'; }

    log('⚠️ Cliente instabile — attendo riconnessione breve...');

    if (disconnectTimer) clearTimeout(disconnectTimer);

    disconnectTimer = setTimeout(() => {
      log('🔄 Riconnessione non recuperata — chiudo peer e attendo rientro cliente');
      fermaMonitorQualita();
      if (pc) {
        try {
          pc.ontrack = null;
          pc.onicecandidate = null;
          pc.onconnectionstatechange = null;
          pc.close();
        } catch(_) {}
        pc = null;
      }
    }, 5000);
  });
}

async function avviaWebRTC() {
  try {
    localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
  } catch(e) {
    log('Nessun microfono rilevato');
  }

  pc = new RTCPeerConnection({
    iceServers: iceServers
  });

  if (localStream) localStream.getTracks().forEach(t => pc.addTrack(t, localStream));

  pc.addTransceiver('video', { direction: 'recvonly' });

  pc.ontrack = (e) => {
    if (e.streams && e.streams[0]) {
      log('Track ricevuto: ' + e.track.kind);
      // Imposta srcObject solo la prima volta per evitare AbortError su play()
      if (!videoRemoto.srcObject) {
        videoRemoto.srcObject = e.streams[0];
        placeholder.style.display = 'none';
        videoArea.classList.add('active');
      }
      // Avvia play() e monitor qualità solo quando arriva il video
      if (e.track.kind === 'video') {
        avviaMonitorQualita();
        videoRemoto.play().catch(err => log('Play error: ' + err));
      }
    }
  };

  pc.onicecandidate = (e) => {
    if (e.candidate) socket.emit('segnale', { token, data: e.candidate });
  };

  pc.onconnectionstatechange = () => {
    const badge = document.getElementById('quality-badge');
    const cs = pc.connectionState;
    if (cs === 'disconnected' || cs === 'failed') {
      if (badge) { badge.textContent = '🔴 Senza video'; badge.style.color = '#ef4444'; badge.style.display = 'block'; }
      videoRemoto.style.opacity = '0.35';
      videoRemoto.style.filter = 'grayscale(60%)';
      log('⚠️ WebRTC ' + cs);
    } else if (cs === 'connected') {
      videoRemoto.style.opacity = '1';
      videoRemoto.style.filter = '';
    }
  };

  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);
  socket.emit('segnale', { token, data: offer });
  log('Offer WebRTC inviato');
}

async function salvaFoto(blobData, gps) {
  const timestamp = new Date().toISOString().slice(0,10);
  const ora = new Date().toTimeString().slice(0,8).replace(/:/g,'-');
  const ref = riferimento ? riferimento.replace(/[^a-zA-Z0-9]/g, '_') : 'perizia';
  const nomeFile = `${ref}_${timestamp}_${ora}_${String(fotoCount).padStart(3,'0')}.jpg`;

  // Ricostruisce Blob — Uint8Array funziona sia su ArrayBuffer che su Buffer-like
  let blob = new Blob([new Uint8Array(blobData)], { type: 'image/jpeg' });

  // Inietta coordinate GPS nei metadati EXIF
  if (gps?.lat != null && gps?.lon != null && typeof piexif !== 'undefined') {
    try {
      const dataUrl = await blobToDataUrl(blob);
      const exifObj = { 'GPS': {} };
      exifObj['GPS'][piexif.GPSIFD.GPSLatitudeRef]  = gps.lat >= 0 ? 'N' : 'S';
      exifObj['GPS'][piexif.GPSIFD.GPSLatitude]     = decimalToDmsRational(Math.abs(gps.lat));
      exifObj['GPS'][piexif.GPSIFD.GPSLongitudeRef] = gps.lon >= 0 ? 'E' : 'W';
      exifObj['GPS'][piexif.GPSIFD.GPSLongitude]    = decimalToDmsRational(Math.abs(gps.lon));
      exifObj['GPS'][piexif.GPSIFD.GPSAltitudeRef]  = 0;
      const exifBytes = piexif.dump(exifObj);
      const withExif  = piexif.insert(exifBytes, dataUrl);
      blob = dataUrlToBlob(withExif, 'image/jpeg');
      log(`📍 GPS nei metadati: ${gps.lat.toFixed(5)}, ${gps.lon.toFixed(5)}`);
    } catch(e) {
      console.warn('EXIF inject fallito:', e.message);
    }
  }

  // Mostra anteprima in UI
  const url = URL.createObjectURL(blob);
  const item = document.createElement('div');
  item.className = 'foto-item';
  item.innerHTML = `<img src="${url}"><div class="foto-item-label">#${String(fotoCount).padStart(3,'0')} · ${new Date().toLocaleTimeString()}</div>`;
  // Crea URL fresco al click per evitare uso di URL revocato
  item.addEventListener('click', () => {
    const clickUrl = URL.createObjectURL(blob);
    window.open(clickUrl);
    setTimeout(() => URL.revokeObjectURL(clickUrl), 5000);
  });
  fotoList.prepend(item);
  fotoCountEl.textContent = fotoCount;
  // Libera URL di anteprima dopo il caricamento dell'immagine
  item.querySelector('img').onload = () => URL.revokeObjectURL(url);

  // Salva su disco (File System Access API) o download diretto
  if (cartella) {
    try {
      const fileHandle = await cartella.getFileHandle(nomeFile, { create: true });
      const writable = await fileHandle.createWritable();
      await writable.write(blob);
      await writable.close();
      log(`✅ Salvata: ${nomeFile}`);
    } catch(e) { log(`❌ Errore salvataggio: ${e.message}`); }
  } else {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = nomeFile;
    a.click();
    setTimeout(() => URL.revokeObjectURL(a.href), 5000);
    log(`⬇️ Download: ${nomeFile}`);
  }
}

// Converte gradi decimali in DMS razionale per EXIF
function decimalToDmsRational(decimal) {
  const deg    = Math.floor(decimal);
  const minFul = (decimal - deg) * 60;
  const min    = Math.floor(minFul);
  const sec    = Math.round((minFul - min) * 60 * 1000);
  return [[deg, 1], [min, 1], [sec, 1000]];
}

// Blob → data URL (per piexifjs)
function blobToDataUrl(blob) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload  = () => resolve(reader.result);
    reader.onerror = () => reject(reader.error);
    reader.readAsDataURL(blob);
  });
}

// data URL → Blob
function dataUrlToBlob(dataUrl, mimeType) {
  const base64 = dataUrl.split(',')[1];
  const binary = atob(base64);
  const arr = new Uint8Array(binary.length);
  for (let i = 0; i < binary.length; i++) arr[i] = binary.charCodeAt(i);
  return new Blob([arr], { type: mimeType });
}
