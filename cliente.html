<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Ispecto</title>
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #080c14;
  --surface: #0d1525;
  --surface2: #111d33;
  --border: rgba(99,179,237,0.12);
  --accent: #3b82f6;
  --accent2: #60a5fa;
  --cyan: #22d3ee;
  --red: #ef4444;
  --green: #10b981;
  --text: #e2e8f0;
  --muted: #94a3b8;
  --font-head: 'Syne', sans-serif;
  --font-body: 'DM Sans', sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body {
  height: 100%;
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text);
  overflow: hidden;
}

/* SCHERMATA AVVIO */
#schermata-avvio {
  height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 32px 24px;
  text-align: center;
  background: var(--bg);
  position: relative;
}

/* Background glow */
#schermata-avvio::before {
  content: '';
  position: absolute;
  top: -100px;
  left: 50%;
  transform: translateX(-50%);
  width: 300px; height: 300px;
  background: radial-gradient(circle, rgba(59,130,246,0.12) 0%, transparent 70%);
  pointer-events: none;
}

.brand {
  font-family: var(--font-head);
  font-size: 0.7rem;
  font-weight: 700;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 40px;
}

.hero-icon {
  width: 96px; height: 96px;
  border-radius: 24px;
  background: linear-gradient(135deg, var(--surface2), var(--surface));
  border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 42px;
  margin: 0 auto 28px;
  box-shadow: 0 20px 60px rgba(59,130,246,0.15);
  animation: float 4s ease-in-out infinite;
}
@keyframes float {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
}

h1 {
  font-family: var(--font-head);
  font-size: 1.7rem;
  font-weight: 800;
  letter-spacing: -0.02em;
  margin-bottom: 10px;
}
.subtitle {
  font-size: 0.9rem;
  color: var(--muted);
  line-height: 1.6;
  margin-bottom: 36px;
  max-width: 280px;
}

/* Steps */
.steps {
  width: 100%;
  max-width: 320px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 20px;
  margin-bottom: 32px;
  text-align: left;
}
.step {
  display: flex;
  align-items: flex-start;
  gap: 14px;
  padding: 8px 0;
  border-bottom: 1px solid var(--border);
}
.step:last-child { border-bottom: none; padding-bottom: 0; }
.step:first-child { padding-top: 0; }
.step-num {
  width: 24px; height: 24px;
  border-radius: 50%;
  background: var(--surface2);
  border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 0.7rem;
  font-weight: 700;
  color: var(--accent2);
  flex-shrink: 0;
  font-family: var(--font-head);
}
.step-text {
  font-size: 0.82rem;
  color: var(--muted);
  line-height: 1.4;
  padding-top: 3px;
}

#btn-avvia {
  width: 100%;
  max-width: 320px;
  padding: 18px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 14px;
  font-family: var(--font-head);
  font-size: 1rem;
  font-weight: 700;
  letter-spacing: 0.05em;
  cursor: pointer;
  transition: all 0.2s;
  box-shadow: 0 8px 30px rgba(59,130,246,0.3);
}
#btn-avvia:active { transform: scale(0.97); }
#btn-avvia:disabled { opacity: 0.4; }

#stato-avvio {
  margin-top: 16px;
  font-size: 0.82rem;
  color: var(--muted);
  min-height: 20px;
}
#stato-avvio.errore { color: var(--red); }

/* SCHERMATA SESSIONE */
#schermata-sessione {
  display: none;
  height: 100%;
  flex-direction: column;
  position: relative;
}

video#video-locale {
  flex: 1;
  width: 100%;
  object-fit: cover;
  display: block;
  background: #000;
}

.sessione-overlay {
  position: absolute;
  inset: 0;
  pointer-events: none;
}

/* Corner decorators */
.corner {
  position: absolute;
  width: 24px; height: 24px;
  border-color: rgba(99,179,237,0.5);
  border-style: solid;
}
.corner-tl { top: 16px; left: 16px; border-width: 2px 0 0 2px; }
.corner-tr { top: 16px; right: 16px; border-width: 2px 2px 0 0; }
.corner-bl { bottom: 80px; left: 16px; border-width: 0 0 2px 2px; }
.corner-br { bottom: 80px; right: 16px; border-width: 0 2px 2px 0; }

/* Scan line */
.scan-line {
  position: absolute;
  left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--cyan), transparent);
  opacity: 0.3;
  animation: scan 5s linear infinite;
}
@keyframes scan { 0% { top: 0; } 100% { top: calc(100% - 80px); } }

/* Status bar */
#status-bar {
  position: absolute;
  top: 0; left: 0; right: 0;
  padding: 16px;
  background: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.live-badge {
  display: flex; align-items: center; gap: 6px;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(8px);
  border: 1px solid rgba(16,185,129,0.3);
  border-radius: 20px;
  padding: 5px 12px;
  font-size: 0.75rem;
  font-weight: 600;
  color: var(--green);
  font-family: var(--font-head);
  letter-spacing: 0.1em;
}
.live-badge::before {
  content: '';
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--green);
  box-shadow: 0 0 6px var(--green);
  animation: pulse 1.5s infinite;
}
@keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.3; } }

/* Bottom bar */
#bottom-bar {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  padding: 16px 20px;
  background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
  text-align: center;
}
#istruzione {
  font-size: 0.82rem;
  color: rgba(255,255,255,0.6);
  font-family: var(--font-head);
  letter-spacing: 0.05em;
}

/* NOTIFICA FOTO */
#notifica-foto {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: white;
  z-index: 100;
  animation: photoFlash 0.4s ease-out forwards;
}
@keyframes photoFlash {
  0% { opacity: 0.9; }
  100% { opacity: 0; }
}
#notifica-testo {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: rgba(0,0,0,0.85);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 16px;
  padding: 16px 28px;
  font-family: var(--font-head);
  font-size: 1rem;
  font-weight: 700;
  color: #fff;
  z-index: 101;
  display: none;
  letter-spacing: 0.05em;
}
</style>
</head>
<body>

<!-- SCHERMATA AVVIO -->
<div id="schermata-avvio">
  <div class="brand">Ispecto</div>
  <div class="hero-icon">
    <img src="Logo.png" alt="Ispecto" style="width:80px;height:80px;object-fit:contain;border-radius:16px;">
  </div>
  <h1>Ispecto</h1>
  <p class="subtitle">Consenti accesso alla fotocamera per collegarti con l'operatore.</p>

  <div class="steps">
    <div class="step">
      <div class="step-num">1</div>
      <div class="step-text">Premi <strong>Avvia</strong> e consenti fotocamera e microfono</div>
    </div>
    <div class="step">
      <div class="step-num">2</div>
      <div class="step-text">Inquadra l'oggetto della perizia</div>
    </div>
    <div class="step">
      <div class="step-num">3</div>
      <div class="step-text">Le foto vengono scattate dall'operatore — tieni fermo il telefono</div>
    </div>
  </div>

  <button id="btn-avvia">📹 Avvia Ispecto</button>
  <div id="stato-avvio">Pronto</div>
</div>

<!-- SCHERMATA SESSIONE -->
<div id="schermata-sessione">
  <video id="video-locale" autoplay playsinline muted></video>
  <div class="sessione-overlay">
    <div class="corner corner-tl"></div>
    <div class="corner corner-tr"></div>
    <div class="corner corner-bl"></div>
    <div class="corner corner-br"></div>
    <div class="scan-line"></div>
    <div id="status-bar">
      <div class="live-badge">LIVE</div>
    </div>
    <div id="bottom-bar">
      <div id="istruzione">Tieni il telefono fermo 📷</div>
    </div>
  </div>
</div>

<!-- EFFETTI FOTO -->
<div id="notifica-foto"></div>
<div id="notifica-testo">📸 Foto Scattata!</div>

<script>
const SERVER = 'https://videoperizie-server-production.up.railway.app';
const params = new URLSearchParams(window.location.search);
const token = params.get('token');

const btnAvvia = document.getElementById('btn-avvia');
const statoAvvio = document.getElementById('stato-avvio');
const schermataAvvio = document.getElementById('schermata-avvio');
const schermataSessione = document.getElementById('schermata-sessione');
const videoLocale = document.getElementById('video-locale');
const notificaFoto = document.getElementById('notifica-foto');
const notificaTesto = document.getElementById('notifica-testo');
const istruzione = document.getElementById('istruzione');

if (!token) {
  statoAvvio.textContent = 'Link non valido. Contatta l\'operatore.';
  statoAvvio.className = 'errore';
  btnAvvia.disabled = true;
} else {
  // Verifica stato perizia
  fetch(`${SERVER}/perizie/check/${token}`)
    .then(r => r.json())
    .then(data => {
      if (!data.valido) {
        const msg = data.motivo === 'completata' ? 'Perizia terminata.' : 
                    data.motivo === 'scaduta' ? 'Link scaduto. Contatta l\'operatore.' :
                    'Link non valido.';
        statoAvvio.textContent = msg;
        statoAvvio.className = 'errore';
        btnAvvia.disabled = true;
      } else if (data.stato === 'creata') {
        statoAvvio.textContent = 'In attesa dell\'operatore...';
      }
    });
}

let socket, pc, localStream;

btnAvvia.addEventListener('click', async () => {
  btnAvvia.disabled = true;
  statoAvvio.textContent = 'Accesso fotocamera in corso...';

  try {
    localStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 1920 }, height: { ideal: 1080 } },
      audio: true
    });
    videoLocale.srcObject = localStream;
    statoAvvio.textContent = 'Connessione al server...';
    collegaSocket();
  } catch(e) {
    statoAvvio.textContent = '⚠️ Consenti fotocamera e microfono per continuare';
    statoAvvio.className = 'errore';
    btnAvvia.disabled = false;
  }
});

function collegaSocket() {
  socket = io(SERVER);

  socket.on('connect', () => {
    socket.emit('join-cliente', { token });
  });

  socket.on('joined', () => {
    schermataAvvio.style.display = 'none';
    schermataSessione.style.display = 'flex';
  });

  socket.on('segnale', async ({ data }) => {
    if (!pc) await avviaWebRTC();
    if (data.type === 'offer') {
      await pc.setRemoteDescription(data);
      const answer = await pc.createAnswer();
      await pc.setLocalDescription(answer);
      socket.emit('segnale', { token, data: answer });
    } else if (data.candidate) {
      await pc.addIceCandidate(data);
    }
  });

  socket.on('scatta-foto', () => {
    mostraNotifica();
    scattaFoto();
  });

  socket.on('peer-disconnesso', () => {
    istruzione.textContent = '⚠️ Operatore disconnesso';
  });
  socket.on('sessione-terminata', () => {
    schermataSessione.style.display = 'none';
    schermataAvvio.style.display = 'flex';
    statoAvvio.textContent = 'Perizia terminata. Grazie!';
    statoAvvio.className = '';
    btnAvvia.disabled = true;
  });

  socket.on('errore', (msg) => {
    statoAvvio.textContent = msg;
    statoAvvio.className = 'errore';
    schermataAvvio.style.display = 'flex';
    schermataSessione.style.display = 'none';
    btnAvvia.disabled = true;
  });
}

async function avviaWebRTC() {
  pc = new RTCPeerConnection({
    iceServers: [
      { urls: 'stun:stun.l.google.com:19302' },
      { urls: 'stun:stun1.l.google.com:19302' }
    ]
  });

  localStream.getTracks().forEach(t => pc.addTrack(t, localStream));

  pc.onicecandidate = (e) => {
    if (e.candidate) socket.emit('segnale', { token, data: e.candidate });
  };

  pc.ontrack = (e) => {
    if (e.streams && e.streams[0]) {
      const audio = new Audio();
      audio.srcObject = e.streams[0];
      audio.play().catch(() => {});
    }
  };
}

let gpsCoords = null;

// Chiedi GPS all'avvio
if (navigator.geolocation) {
  navigator.geolocation.getCurrentPosition(
    pos => { gpsCoords = { lat: pos.coords.latitude, lon: pos.coords.longitude, acc: pos.coords.accuracy }; },
    err => { gpsCoords = null; },
    { enableHighAccuracy: true }
  );
}

function scattaFoto() {
  const canvas = document.createElement('canvas');
  const MAX = 1024;
  let w = videoLocale.videoWidth;
  let h = videoLocale.videoHeight;
  if (w > MAX) { h = Math.round(h * MAX / w); w = MAX; }
  canvas.width = w;
  canvas.height = h;
  const ctx = canvas.getContext('2d');
  ctx.drawImage(videoLocale, 0, 0, w, h);

  // Timestamp elegante
  const ora = new Date();
  const testo = ora.toLocaleDateString('it-IT', { day:'2-digit', month:'2-digit', year:'numeric' }) + 
                '  ' + 
                ora.toLocaleTimeString('it-IT', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
  const fontSize = Math.round(h * 0.022);
  const padding = Math.round(h * 0.012);
  
  ctx.font = `bold ${fontSize}px monospace`;
  const dataW = ctx.measureText(testo).width;
  
  let gps = '';
  if (gpsCoords) gps = `GPS: ${gpsCoords.lat.toFixed(5)}, ${gpsCoords.lon.toFixed(5)}`;
  ctx.font = `${Math.round(fontSize * 0.8)}px monospace`;
  const gpsW = gps ? ctx.measureText(gps).width : 0;
  
  const boxW = Math.max(dataW, gpsW) + padding * 2;
  const boxH = gps ? fontSize * 2.4 : fontSize * 1.4;
  const boxX = w - boxW - padding;
  const boxY = h - boxH - padding;
  
  ctx.fillStyle = 'rgba(0,0,0,0.45)';
  ctx.fillRect(boxX, boxY, boxW, boxH);
  
  ctx.fillStyle = '#ffffff';
  ctx.font = `bold ${fontSize}px monospace`;
  ctx.textAlign = 'right';
  ctx.textBaseline = 'top';
  ctx.fillText(testo, w - padding * 2, boxY + padding * 0.8);
  
  if (gps) {
    ctx.font = `${Math.round(fontSize * 0.8)}px monospace`;
    ctx.fillStyle = 'rgba(255,255,255,0.7)';
    ctx.fillText(gps, w - padding * 2, boxY + fontSize * 1.8);
  }
  ctx.textAlign = 'left';

  canvas.toBlob(blob => {
    blob.arrayBuffer().then(buffer => {
      socket.emit('foto', { 
        token, 
        blob: Array.from(new Uint8Array(buffer)),
        gps: gpsCoords
      });
    });
  }, 'image/jpeg', 0.85);
}

function mostraNotifica() {
  notificaFoto.style.display = 'block';
  notificaTesto.style.display = 'block';
  setTimeout(() => {
    notificaFoto.style.display = 'none';
    notificaTesto.style.display = 'none';
  }, 600);
}
</script>
</body>
</html>
