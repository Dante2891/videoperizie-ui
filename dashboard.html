<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Videoperizie — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #080c14;
  --surface: #0d1525;
  --surface2: #111d33;
  --border: rgba(99,179,237,0.12);
  --accent: #3b82f6;
  --accent2: #60a5fa;
  --cyan: #22d3ee;
  --red: #ef4444;
  --green: #10b981;
  --orange: #f59e0b;
  --text: #e2e8f0;
  --muted: #94a3b8;
  --font-head: 'Syne', sans-serif;
  --font-body: 'DM Sans', sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-body); background: var(--bg); color: var(--text); min-height: 100vh; }

header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky; top: 0; z-index: 10;
}
.logo {
  font-family: var(--font-head);
  font-weight: 800;
  font-size: 1rem;
  letter-spacing: 0.05em;
  display: flex; align-items: center; gap: 10px;
}
.logo-icon { width: 28px; height: 28px; background: var(--accent); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 14px; }
.header-right { display: flex; align-items: center; gap: 12px; }
.studio-badge {
  font-size: 0.8rem; color: var(--muted);
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 4px 12px;
}
.btn-logout {
  background: none; border: 1px solid var(--border);
  color: var(--muted); border-radius: 8px;
  padding: 6px 12px; cursor: pointer;
  font-size: 0.8rem; font-family: var(--font-body);
  transition: all 0.2s;
}
.btn-logout:hover { border-color: var(--red); color: var(--red); }

main { max-width: 1100px; margin: 0 auto; padding: 32px 24px; }

.page-header {
  display: flex; align-items: center;
  justify-content: space-between;
  margin-bottom: 28px;
}
.page-title { font-family: var(--font-head); font-size: 1.5rem; font-weight: 800; }
.page-title span { color: var(--muted); font-weight: 400; font-size: 1rem; margin-left: 8px; }

.btn-new {
  background: var(--accent); color: #fff;
  border: none; border-radius: 10px;
  padding: 12px 20px;
  font-family: var(--font-head); font-size: 0.9rem; font-weight: 700;
  cursor: pointer; transition: all 0.2s;
  box-shadow: 0 4px 24px rgba(59,130,246,0.4);
  display: flex; align-items: center; gap: 8px;
}
.btn-new:hover { background: var(--accent2); transform: translateY(-1px); }

/* Stats */
.stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 28px; }
.stat-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; padding: 24px 28px;
}
.stat-label { font-size: 0.72rem; font-family: var(--font-head); letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
.stat-value { font-family: 'DM Sans', sans-serif; font-size: 2.2rem; font-weight: 700; }
.stat-value.green { color: var(--green); }
.stat-value.blue { color: var(--accent2); }
.stat-value.orange { color: var(--orange); }

/* Tabella */
.table-container {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 16px; overflow: hidden;
}
.table-header {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.table-title { font-family: var(--font-head); font-size: 0.85rem; font-weight: 700; letter-spacing: 0.05em; }
#search {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 8px; padding: 8px 12px;
  color: var(--text); font-family: var(--font-body); font-size: 0.85rem;
  outline: none; width: 220px; transition: border-color 0.2s;
}
#search:focus { border-color: var(--accent); }

table { width: 100%; border-collapse: collapse; }
th {
  text-align: left; padding: 12px 20px;
  font-size: 0.7rem; font-family: var(--font-head);
  letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--muted); border-bottom: 1px solid var(--border);
  font-weight: 700;
}
td { padding: 14px 20px; border-bottom: 1px solid var(--border); font-size: 0.88rem; vertical-align: middle; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: rgba(59,130,246,0.08); }

.stato-badge {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 3px 10px; border-radius: 20px;
  font-size: 0.72rem; font-weight: 600; font-family: var(--font-head);
  letter-spacing: 0.05em;
}
.stato-creata { background: rgba(100,116,139,0.15); color: var(--muted); }
.stato-in_corso { background: rgba(245,158,11,0.15); color: var(--orange); }
.stato-completata { background: rgba(16,185,129,0.15); color: var(--green); }

.btn-avvia {
  background: var(--accent); color: #fff;
  border: none; border-radius: 6px;
  padding: 6px 12px; cursor: pointer;
  font-size: 0.78rem; font-family: var(--font-head); font-weight: 700;
  transition: all 0.2s;
}
.btn-avvia:hover { background: var(--accent2); }
.btn-wa {
  background: rgba(37,211,102,0.1); color: #25d366;
  border: 1px solid rgba(37,211,102,0.2);
  border-radius: 6px; padding: 6px 10px;
  cursor: pointer; font-size: 0.78rem;
  font-family: var(--font-body); font-weight: 500;
  transition: all 0.2s; text-decoration: none;
  display: inline-block;
}
.btn-wa:hover { background: rgba(37,211,102,0.2); }

.empty {
  text-align: center; padding: 60px 20px;
  color: var(--muted); font-size: 0.9rem;
}
.empty-icon { font-size: 3rem; margin-bottom: 12px; }

/* MODAL NUOVA PERIZIA */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.7); backdrop-filter: blur(4px);
  z-index: 100; align-items: center; justify-content: center;
}
.modal-overlay.visible { display: flex; }
.modal {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 20px; padding: 28px; width: 100%; max-width: 460px;
  margin: 24px;
}
.modal-title {
  font-family: var(--font-head); font-size: 1.2rem; font-weight: 800;
  margin-bottom: 20px;
}
.field { margin-bottom: 14px; }
label { display: block; font-size: 0.75rem; font-family: var(--font-head); letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); margin-bottom: 5px; }
input[type=text], input[type=tel] {
  width: 100%; padding: 11px 13px;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 8px; color: var(--text);
  font-family: var(--font-body); font-size: 0.9rem; outline: none;
  transition: border-color 0.2s;
}
input:focus { border-color: var(--accent); }
.modal-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.modal-actions { display: flex; gap: 10px; margin-top: 20px; }
.btn-cancel {
  flex: 1; padding: 12px; background: var(--surface2);
  border: 1px solid var(--border); border-radius: 10px;
  color: var(--muted); cursor: pointer; font-family: var(--font-body);
  font-size: 0.9rem; transition: all 0.2s;
}
.btn-cancel:hover { border-color: var(--red); color: var(--red); }
.btn-crea {
  flex: 2; padding: 12px; background: var(--accent);
  border: none; border-radius: 10px;
  color: #fff; cursor: pointer;
  font-family: var(--font-head); font-size: 0.95rem; font-weight: 700;
  transition: all 0.2s;
}
.btn-crea:hover { background: var(--accent2); }
.btn-crea:disabled { opacity: 0.4; cursor: not-allowed; }

.btn-termina-dash {
  background: rgba(16,185,129,0.1); color: var(--green);
  border: 1px solid rgba(16,185,129,0.2);
  border-radius: 6px; padding: 6px 10px;
  cursor: pointer; font-size: 0.78rem;
  font-family: var(--font-body); font-weight: 500;
  transition: all 0.2s;
}
.btn-termina-dash:disabled { opacity: 0.3; cursor: not-allowed; }
.btn-termina-dash:not(:disabled):hover { background: rgba(16,185,129,0.2); }


</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">📹</div>
    Videoperizie
  </div>
  <div class="header-right">
    <span class="studio-badge" id="studio-nome">Studio</span>
    <button class="btn-logout" id="btn-logout">Esci</button>
  </div>
</header>

<main>
  <div class="page-header">
    <div class="page-title">
      Dashboard <span id="operatore-nome"></span>
    </div>
    <button class="btn-new" id="btn-nuova">＋ Nuova Perizia</button>
  </div>

  <div class="stats">
    <div class="stat-card">
      <div class="stat-label">Totale Perizie</div>
      <div class="stat-value blue" id="stat-totale">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Completate</div>
      <div class="stat-value green" id="stat-completate">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">In Corso</div>
      <div class="stat-value orange" id="stat-in-corso">0</div>
    </div>
  </div>

  <div class="table-container">
    <div class="table-header">
      <div class="table-title">PERIZIE STUDIO</div>
      <input type="text" id="search" placeholder="🔍 Cerca cliente o riferimento...">
    </div>
    <table>
      <thead>
        <tr>
          <th>Cliente</th>
          <th>Riferimento</th>
          <th>Operatore</th>
          <th>Data</th>
          <th>Foto</th>
          <th>Stato</th>
          <th>Azioni</th>
        </tr>
      </thead>
      <tbody id="perizie-body">
        <tr><td colspan="7"><div class="empty"><div class="empty-icon">⏳</div>Caricamento...</div></td></tr>
      </tbody>
    </table>
  </div>
</main>

<!-- MODAL NUOVA PERIZIA -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-title">＋ Nuova Perizia</div>
    <div class="modal-row">
      <div class="field">
        <label>Nome</label>
        <input type="text" id="f-nome" placeholder="Mario">
      </div>
      <div class="field">
        <label>Cognome</label>
        <input type="text" id="f-cognome" placeholder="Rossi">
      </div>
    </div>
    <div class="field">
      <label>Riferimento Pratica</label>
      <input type="text" id="f-riferimento" placeholder="es. SIN-2026-001">
    </div>
    <div class="field">
      <label>Telefono Cliente</label>
      <input type="tel" id="f-telefono" placeholder="+39 333 1234567">
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" id="btn-cancel">Annulla</button>
      <button class="btn-crea" id="btn-crea">Crea e Avvia →</button>
    </div>
  </div>
</div>

<script>
const SERVER = 'https://videoperizie-server-production.up.railway.app';
const token = localStorage.getItem('vp_token');

if (!token) window.location.href = 'index.html';

document.getElementById('studio-nome').textContent = localStorage.getItem('vp_studio') || '';
document.getElementById('operatore-nome').innerHTML = `<span>${localStorage.getItem('vp_nome') || ''}</span>`;

document.getElementById('btn-logout').addEventListener('click', () => {
  localStorage.clear();
  window.location.href = 'index.html';
});

let tuttePerizie = [];

async function caricaPerizie() {
  try {
    const res = await fetch(`${SERVER}/perizie`, {
      headers: { 'Authorization': `Bearer ${token}` }
    });
    if (res.status === 401) { localStorage.clear(); window.location.href = 'index.html'; return; }
	if (res.status === 403) {
	  alert('Account sospeso. Contatta il supporto.');
	  localStorage.clear();
	  window.location.href = 'index.html';
	  return;
	}
    tuttePerizie = await res.json();
    aggiornaStat();
    renderPerizie(tuttePerizie);
  } catch(e) {
    console.error(e);
  }
}

function aggiornaStat() {
  document.getElementById('stat-totale').textContent = tuttePerizie.length;
  document.getElementById('stat-completate').textContent = tuttePerizie.filter(p => p.stato === 'completata').length;
  document.getElementById('stat-in-corso').textContent = tuttePerizie.filter(p => p.stato === 'in_corso').length;
}

function renderPerizie(perizie) {
  const tbody = document.getElementById('perizie-body');
  if (perizie.length === 0) {
    tbody.innerHTML = `<tr><td colspan="7"><div class="empty"><div class="empty-icon">📋</div>Nessuna perizia ancora. Crea la prima!</div></td></tr>`;
    return;
  }
  tbody.innerHTML = perizie.map(p => {
    const data = new Date(p.creata_il).toLocaleDateString('it-IT', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' });
    const tel = p.telefono_cliente.replace(/\s/g, '');
    const waLink = `https://wa.me/${tel.startsWith('+') ? tel.slice(1) : '39' + tel}?text=${encodeURIComponent(`Gentile ${p.nome_cliente}, la contatto per avviare la videoperizia. Clicchi sul link: ${window.location.origin}/videoperizie/cliente.html?token=${p.token_sessione}`)}`;
    return `
    <tr>
      <td><strong>${p.nome_cliente} ${p.cognome_cliente}</strong><br><span style="color:var(--muted);font-size:0.78rem">${p.telefono_cliente}</span></td>
      <td>${p.riferimento || '—'}</td>
      <td style="color:var(--muted)">${p.op_nome} ${p.op_cognome}</td>
      <td style="color:var(--muted);font-size:0.82rem">${data}</td>
      <td style="text-align:center">${p.num_foto || 0}</td>
      <td><span class="stato-badge stato-${p.stato}">${p.stato.replace('_',' ')}</span></td>
      <td style="display:flex;gap:6px;align-items:center">
        <button class="btn-termina-dash" onclick="terminaPerizia('${p.id}')" ${p.stato === 'completata' ? 'disabled' : ''}>✅ Termina</button>
        ${p.stato !== 'completata' ? `<button class="btn-avvia" onclick="avviaPerizia('${p.token_sessione}', '${p.id}', '${p.telefono_cliente}', '${p.nome_cliente} ${p.cognome_cliente}', '${p.riferimento || ''}')">▶ Avvia</button>` : ''}
      </td>
    </tr>`;
  }).join('');
}

document.getElementById('search').addEventListener('input', (e) => {
  const q = e.target.value.toLowerCase();
  const filtrate = tuttePerizie.filter(p =>
    `${p.nome_cliente} ${p.cognome_cliente} ${p.riferimento || ''}`.toLowerCase().includes(q)
  );
  renderPerizie(filtrate);
});

// Modal
document.getElementById('btn-nuova').addEventListener('click', () => {
  document.getElementById('modal').classList.add('visible');
});
document.getElementById('btn-cancel').addEventListener('click', () => {
  document.getElementById('modal').classList.remove('visible');
});
document.getElementById('modal').addEventListener('click', (e) => {
  if (e.target === document.getElementById('modal')) document.getElementById('modal').classList.remove('visible');
});

document.getElementById('btn-crea').addEventListener('click', async () => {
  const nome = document.getElementById('f-nome').value.trim();
  const cognome = document.getElementById('f-cognome').value.trim();
  const riferimento = document.getElementById('f-riferimento').value.trim();
  const telefono = document.getElementById('f-telefono').value.trim();

  if (!nome || !cognome || !telefono) {
    alert('Nome, cognome e telefono sono obbligatori');
    return;
  }

  const btn = document.getElementById('btn-crea');
  btn.disabled = true;
  btn.textContent = 'Creazione...';

  try {
    const res = await fetch(`${SERVER}/perizie`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
      body: JSON.stringify({ nome_cliente: nome, cognome_cliente: cognome, riferimento, telefono_cliente: telefono })
    });
    const perizia = await res.json();
    document.getElementById('modal').classList.remove('visible');
    resetForm();
    await caricaPerizie();
    avviaPerizia(perizia.token_sessione, perizia.id, perizia.telefono_cliente, `${perizia.nome_cliente} ${perizia.cognome_cliente}`);
  } catch(e) {
    alert('Errore nella creazione');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Crea e Avvia →';
  }
});

function resetForm() {
  ['f-nome','f-cognome','f-riferimento','f-telefono'].forEach(id => document.getElementById(id).value = '');
}

async function avviaPerizia(tokenSessione, perizia_id, telefono, nome, riferimento) {
  localStorage.setItem('vp_perizia_id', perizia_id);
  localStorage.setItem('vp_riferimento', riferimento || '');
  window.location.href = `operatore.html?token=${tokenSessione}&perizia_id=${perizia_id}&telefono=${encodeURIComponent(telefono)}&nome=${encodeURIComponent(nome)}&riferimento=${encodeURIComponent(riferimento || '')}`;
}

caricaPerizie();

async function terminaPerizia(id) {
  if (!confirm('Terminare questa perizia?')) return;
  await fetch(`${SERVER}/perizie/${id}`, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
    body: JSON.stringify({ stato: 'completata' })
  });
  await caricaPerizie();
}

</script>
</body>
</html>
