<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ispecto — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #080c14;
  --surface: #0d1525;
  --surface2: #111d33;
  --border: rgba(99,179,237,0.12);
  --accent: #3b82f6;
  --accent2: #60a5fa;
  --red: #ef4444;
  --green: #10b981;
  --text: #e2e8f0;
  --muted: #94a3b8;
  --font-head: 'Syne', sans-serif;
  --font-body: 'DM Sans', sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}
body::before {
  content: '';
  position: fixed;
  top: -200px; left: 50%;
  transform: translateX(-50%);
  width: 600px; height: 600px;
  background: radial-gradient(circle, rgba(59,130,246,0.08) 0%, transparent 70%);
  pointer-events: none;
}
.login-box {
  width: 100%;
  max-width: 400px;
  padding: 24px;
}
.logo {
  text-align: center;
  margin-bottom: 40px;
}
.logo-icon {
  width: 56px; height: 56px;
  background: var(--accent);
  border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  font-size: 26px;
  margin: 0 auto 16px;
  box-shadow: 0 8px 30px rgba(59,130,246,0.3);
}
.logo h1 {
  font-family: var(--font-head);
  font-size: 1.5rem;
  font-weight: 800;
}
.logo p {
  font-size: 0.85rem;
  color: var(--muted);
  margin-top: 4px;
}
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 28px;
}
.field {
  margin-bottom: 16px;
}
label {
  display: block;
  font-size: 0.8rem;
  font-weight: 500;
  color: var(--muted);
  margin-bottom: 6px;
  font-family: var(--font-head);
  letter-spacing: 0.05em;
  text-transform: uppercase;
}
input {
  width: 100%;
  padding: 12px 14px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-family: var(--font-body);
  font-size: 0.95rem;
  outline: none;
  transition: border-color 0.2s;
}
input:focus { border-color: var(--accent); }
.btn {
  width: 100%;
  padding: 14px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 10px;
  font-family: var(--font-head);
  font-size: 1rem;
  font-weight: 700;
  cursor: pointer;
  margin-top: 8px;
  transition: all 0.2s;
  box-shadow: 0 4px 24px rgba(59,130,246,0.4);
}
.btn:hover { background: var(--accent2); transform: translateY(-1px); }
.btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
#errore {
  margin-top: 12px;
  padding: 10px;
  background: rgba(239,68,68,0.1);
  border: 1px solid rgba(239,68,68,0.2);
  border-radius: 8px;
  font-size: 0.85rem;
  color: var(--red);
  display: none;
  text-align: center;
}
</style>
</head>
<body>
<div class="login-box">
  <div class="logo">
    <img src="Logo.png" alt="Ispecto" style="width:120px;margin:0 auto 8px;display:block;">
    <p>Accedi al tuo account</p>
  </div>
  <div class="card">
    <div class="field">
      <label>Email</label>
      <input type="email" id="email" placeholder="nome@studio.it" autocomplete="email">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="btn" id="btn-login">Accedi</button>
    <div id="errore"></div>
  </div>
</div>

<script>
const SERVER = 'https://videoperizie-server-production.up.railway.app';

document.getElementById('password').addEventListener('keydown', e => {
  if (e.key === 'Enter') login();
});

document.getElementById('btn-login').addEventListener('click', login);

async function login() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn = document.getElementById('btn-login');
  const errore = document.getElementById('errore');

  if (!email || !password) {
    mostraErrore('Inserisci email e password');
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Accesso in corso...';
  errore.style.display = 'none';

  try {
    const res = await fetch(`${SERVER}/auth/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();

    if (!res.ok) {
      mostraErrore(data.errore || 'Errore di accesso');
      return;
    }

    localStorage.setItem('vp_token', data.token);
    localStorage.setItem('vp_nome', data.nome);
    localStorage.setItem('vp_studio', data.studio_nome);
    localStorage.setItem('vp_ruolo', data.ruolo);
    localStorage.setItem('vp_piano', data.piano);

    window.location.href = 'dashboard.html';
  } catch(e) {
    mostraErrore('Errore di connessione al server');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Accedi';
  }
}

function mostraErrore(msg) {
  const errore = document.getElementById('errore');
  errore.textContent = msg;
  errore.style.display = 'block';
}

// Se già loggato vai alla dashboard
if (localStorage.getItem('vp_token')) {
  window.location.href = 'dashboard.html';
}
</script>
</body>
</html>
